<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PEDIDOS MASSUAR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>PEDIDOS MASSUAR</h1>
      <p>Completá tus datos, seleccioná cantidades y revisá el resumen antes de enviar.</p>
    </div>
  </header>

  <main class="layout">
    <section class="form-panel" id="formPanel">
      <div id="formHost">Cargando formulario...</div>
    </section>

    <aside class="cart-panel" id="cartPanel">
      <div class="cart-card">
        <div class="cart-top">
          <div>
            <span class="eyebrow">RESUMEN EN VIVO</span>
            <h2>🛒 Tu pedido</h2>
          </div>
          <button type="button" id="clearCart">Vaciar</button>
        </div>

        <div class="cart-stats">
          <div><strong id="productCount">0</strong><span>productos</span></div>
          <div><strong id="unitCount">0</strong><span>unidades</span></div>
        </div>

        <div id="cartItems" class="cart-items">Todavía no seleccionaste productos.</div>
        <p class="cart-note">El resumen es orientativo. El pedido se envía normalmente por Jotform.</p>
      </div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
